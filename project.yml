name: HumidityWeather
options:
  bundleIdPrefix: com.diego.humidity
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N9X59A9RBT

packages:
  WeatherCore:
    path: WeatherCore

targets:
  WeatherAppiOS:
    type: application
    platform: iOS
    sources:
      - path: WeatherApp/Sources
    dependencies:
      - package: WeatherCore
      - target: WeatherWidgetiOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diego.humidity.ios
        CODE_SIGN_ENTITLEMENTS: Config/WeatherApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    info:
      path: WeatherApp/Info-iOS.plist
      properties:
        CFBundleDisplayName: 湿度天气
        LSApplicationCategoryType: public.app-category.weather
        NSLocationWhenInUseUsageDescription: 用于获取当前位置并为小组件展示实时天气。
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.diego.humidity
            CFBundleURLSchemes:
              - humidity

  WeatherWidgetiOS:
    type: app-extension
    platform: iOS
    sources:
      - path: WeatherWidgetExtension/Sources
    dependencies:
      - package: WeatherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diego.humidity.ios.widget
        CODE_SIGN_ENTITLEMENTS: Config/WeatherWidget.entitlements
    info:
      path: WeatherWidgetExtension/Info-iOS.plist
      properties:
        CFBundleDisplayName: 天气组件
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  WeatherAppmacOS:
    type: application
    platform: macOS
    sources:
      - path: WeatherApp/Sources
    dependencies:
      - package: WeatherCore
      - target: WeatherWidgetmacOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diego.humidity.macos
        CODE_SIGN_ENTITLEMENTS: Config/WeatherApp.entitlements
    info:
      path: WeatherApp/Info-macOS.plist
      properties:
        CFBundleDisplayName: 湿度天气
        LSApplicationCategoryType: public.app-category.weather
        NSLocationWhenInUseUsageDescription: 用于获取当前位置并为小组件展示实时天气。
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.diego.humidity
            CFBundleURLSchemes:
              - humidity

  WeatherWidgetmacOS:
    type: app-extension
    platform: macOS
    sources:
      - path: WeatherWidgetExtension/Sources
    dependencies:
      - package: WeatherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diego.humidity.macos.widget
        CODE_SIGN_ENTITLEMENTS: Config/WeatherWidget.entitlements
    info:
      path: WeatherWidgetExtension/Info-macOS.plist
      properties:
        CFBundleDisplayName: 天气组件
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  WeatherAppiOS:
    build:
      targets:
        WeatherAppiOS: all
    run:
      config: Debug
  WeatherAppmacOS:
    build:
      targets:
        WeatherAppmacOS: all
    run:
      config: Debug
